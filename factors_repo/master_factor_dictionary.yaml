name: "master_factor_dictionary"
version: "2.0"
strategy_type: "因子集锦/字典"
author: "Quant"
updated_at: "2024-04-05"

description: >
  这是结合了A股实证实效的经典因子集锦字典，按估值、盈利、成长、动量反转、技术面、市值与流动性等科学分类划分。
  所有因子支持通过 Tushare 数据源进行计算，并分别提供了 Qlib 和 DuckDB 两种语法表达方式。

analysis:
  pros: "兼顾实操性与科学性，支持多平台（Qlib、DuckDB）无缝切换，适配全市场/小市值/指数增强等多类量化策略。"
  cons: "部分财务因子存在发布滞后问题，在实盘或回测中需注意避免未来函数（如使用 TTM 数据或滞后处理）。"
  optimization_direction: "持续从研报和前沿论文中吸收新因子，剔除失效因子，并增加更多的财务质量和一致预期类因子。"

factors:
  # -------------------------------------------------------------------------
  # 类别 1: 估值因子 (Valuation) - 基于 Tushare daily_basic 数据
  # -------------------------------------------------------------------------
  - name: "pe_ttm"
    category: "估值"
    expression: 
      qlib: "$pe_ttm"
      duckdb: "pe_ttm"
    meaning: "市盈率（TTM）。反映股价相对盈利的溢价，值越低估值越低。"
    usage_scenario: "全市场、价值选股。在震荡市、价值牛市中有效性极强。"
    strategy_hint: "通常作为负向因子（取倒数或求相反数使用），小市值策略中需结合估值筛选避免陷阱。"

  - name: "pb_lf"
    category: "估值"
    expression: 
      qlib: "$pb"
      duckdb: "pb"
    meaning: "市净率（LF）。反映股价相对最新净资产的溢价。"
    usage_scenario: "金融、周期等重资产行业，全市场价值选股。"
    strategy_hint: "通常作为负向因子，在行业轮动或小市值估值过滤中使用。"

  - name: "ps_ttm"
    category: "估值"
    expression: 
      qlib: "$ps_ttm"
      duckdb: "ps_ttm"
    meaning: "市销率（TTM）。反映股价相对营收的溢价。"
    usage_scenario: "适配盈利不稳定的成长股 / 周期股，如创业板、科创板、中小盘成长股。"
    strategy_hint: "负向因子，用于成长股选股、小市值多因子。"

  - name: "dv_ttm"
    category: "估值"
    expression: 
      qlib: "$dv_ttm"
      duckdb: "dv_ttm"  # 注意：当前 quant_data.duckdb 中暂缺此字段，需要在 tushare 下载时补充 dv_ttm 或 dv_ratio
    meaning: "股息率（TTM）。反映股票的现金回报能力。"
    usage_scenario: "大盘蓝筹、高分红板块、震荡市全市场。"
    strategy_hint: "正向因子，用于红利策略、养老型量化策略。"

  # -------------------------------------------------------------------------
  # 类别 2: 盈利因子 (Profitability) - 基于 Tushare 财务或衍生数据
  # -------------------------------------------------------------------------
  - name: "roe_ttm"
    category: "盈利"
    # Qlib 若无直接ROE字段可预处理好放入特征库。假定在衍生数据中有 roe_ttm 列
    expression: 
      qlib: "$roe_ttm"
      duckdb: "roe"  # 对应 financial_indicators 表中的 roe 字段
    meaning: "净资产收益率（TTM）。反映股东权益的盈利效率，值越高盈利能力越强。"
    usage_scenario: "全市场、各行业、小市值股票池。"
    strategy_hint: "正向因子。A股中盈利稳定的标的长期跑赢市场，小市值策略中需通过盈利剔除垃圾股。"

  - name: "roa_ttm"
    category: "盈利"
    expression: 
      qlib: "$roa"
      duckdb: "roa"  # 对应 financial_indicators 表中的 roa 字段
    meaning: "总资产收益率（TTM）。剔除财务杠杆影响，更贴合企业真实盈利。"
    usage_scenario: "高负债行业（金融、地产）、全市场、小市值股票池。"
    strategy_hint: "正向因子，通常结合估值指标（如 PB）筛选性价比。"

  - name: "grossprofit_margin"
    category: "盈利"
    expression: 
      qlib: "$grossprofit_margin"
      duckdb: "grossprofit_margin"
    meaning: "销售毛利率（TTM）。反映企业产品的核心盈利空间，值越高产品竞争力越强。"
    usage_scenario: "制造业、消费、医药等行业，全市场、小市值股票池。"
    strategy_hint: "正向因子，寻找具有宽广护城河和定价权的企业。"

  - name: "netprofit_margin"
    category: "盈利"
    expression: 
      qlib: "$netprofit_margin"
      duckdb: "netprofit_margin"
    meaning: "销售净利率（TTM）。反映企业每 1 元营收的净利润，综合体现成本、费用控制能力。"
    usage_scenario: "全市场、各行业、小市值股票池。"
    strategy_hint: "正向因子，作为财务质量筛选的核心指标。"

  # -------------------------------------------------------------------------
  # 类别 3: 成长因子 (Growth) - 基于 Tushare 财务指标数据
  # -------------------------------------------------------------------------
  - name: "netprofit_yoy"
    category: "成长"
    expression: 
      qlib: "$netprofit_yoy"
      duckdb: "netprofit_yoy"  # 对应 financial_indicators 表中的净利润同比增长率
    meaning: "归母净利润同比增长率。反映公司业绩的扩张速度。"
    usage_scenario: "成长股策略的核心指标，尤其在业绩披露期有效性极强。"
    strategy_hint: "正向因子，通常结合估值指标（如 PEG）筛选高性价比成长股。"

  - name: "tr_yoy"
    category: "成长"
    expression: 
      qlib: "$tr_yoy"
      duckdb: "tr_yoy"
    meaning: "营业总收入同比增长率。反映公司业务规模的扩张速度。"
    usage_scenario: "成长股策略、景气度投资。"
    strategy_hint: "正向因子，结合净利润增长率交叉验证企业是否处于真实的高景气周期。"

  - name: "basic_eps_yoy"
    category: "成长"
    expression: 
      qlib: "$basic_eps_yoy"
      duckdb: "basic_eps_yoy"
    meaning: "基本每股收益同比增长率。综合反映盈利与股本扩张后的实际回报增长。"
    usage_scenario: "全市场选股、成长多因子。"
    strategy_hint: "正向因子，作为盈利成长的核心确认指标。"

  # -------------------------------------------------------------------------
  # 类别 4: 动量/反转类 (Momentum / Reversal) - 基于 Tushare daily 数据
  # -------------------------------------------------------------------------
  - name: "momentum_1m"
    category: "动量与反转"
    expression: 
      qlib: "($close - Ref($close, 20)) / Ref($close, 20)"
      duckdb: "(close - lag(close, 20) over (partition by ts_code order by trade_date)) / lag(close, 20) over (partition by ts_code order by trade_date)"
    meaning: "过去20个交易日的收益率（月度动量）。"
    usage_scenario: "适合中高频选股策略。A股存在短期的反转效应和中长期的动量效应。"
    strategy_hint: "通常与基本面因子结合，作为趋势跟随策略的核心因子。"

  - name: "reversal_5d"
    category: "动量与反转"
    expression: 
      qlib: "-($close - Ref($close, 5)) / Ref($close, 5)"
      duckdb: "-(close - lag(close, 5) over (partition by ts_code order by trade_date)) / lag(close, 5) over (partition by ts_code order by trade_date)"
    meaning: "过去5个交易日收益率的相反数（短期反转）。"
    usage_scenario: "A股短期（周频）选股核心因子，跌得越多的近期反弹概率越高。"
    strategy_hint: "构建周频反转策略，或配合流动性过滤妖股。"

  # -------------------------------------------------------------------------
  # 类别 5: 波动率类 (Volatility)
  # -------------------------------------------------------------------------
  - name: "volatility_1m"
    category: "波动率"
    expression: 
      qlib: "Std(Abs($close/Ref($close,1)-1), 20)"
      duckdb: "stddev(abs(close/lag(close, 1) over (partition by ts_code order by trade_date) - 1)) over (partition by ts_code order by trade_date rows between 19 preceding and current row)"
    meaning: "过去20个交易日的日收益率标准差。"
    usage_scenario: "低波动率异象：A股中历史波动率低的股票，未来收益往往更高且回撤小。"
    strategy_hint: "作为质量因子的补充，或者构建低波红利策略（负向因子）。"

  # -------------------------------------------------------------------------
  # 类别 6: 市值与流动性类 (Market Cap & Liquidity)
  # -------------------------------------------------------------------------
  - name: "circ_mv"
    category: "市值与流动性"
    expression: 
      qlib: "Log($circ_mv)"
      duckdb: "ln(circ_mv)"  # 对应 daily_indicators 表中的 circ_mv，通常取对数处理
    meaning: "流通市值的自然对数。反映公司的体量大小。"
    usage_scenario: "市值因子是A股最显著的风格因子之一（小市值效应）。"
    strategy_hint: "通常作为负向因子，在小市值策略、微盘股策略中作为核心筛选指标。"

  - name: "turnover_rate_1m"
    category: "市值与流动性"
    expression: 
      qlib: "Mean($turnover_rate, 20)"
      duckdb: "avg(turnover_rate) over (partition by ts_code order by trade_date rows between 19 preceding and current row)"
    meaning: "过去20个交易日换手率均值。"
    usage_scenario: "量价背离、量价齐升。温和放量通常是资金介入的信号。"
    strategy_hint: "A股常存在高换手率折价现象，通常将极高换手作为负向因子剔除过度炒作的股票。"

  - name: "illiquidity_amihud"
    category: "市值与流动性"
    expression: 
      qlib: "Mean(Abs($close/Ref($close, 1) - 1) / $amount, 20)"
      duckdb: "avg(abs(close/lag(close, 1) over (partition by ts_code order by trade_date) - 1) / amount) over (partition by ts_code order by trade_date rows between 19 preceding and current row)"
    meaning: "Amihud 非流动性指标：单位交易额引起的绝对收益率变化均值。"
    usage_scenario: "非流动性溢价：流动性越差的股票，投资者要求更高的预期收益补偿。"
    strategy_hint: "适合中低频、容量较小的策略，赚取流动性折价。"

  # -------------------------------------------------------------------------
  # 类别 7: 技术面/趋势类 (Technical / Trend)
  # -------------------------------------------------------------------------
  - name: "ma_cross_5_20"
    category: "技术面"
    expression: 
      qlib: "Mean($close, 5) / Mean($close, 20) - 1"
      duckdb: "(avg(close) over (partition by ts_code order by trade_date rows between 4 preceding and current row)) / (avg(close) over (partition by ts_code order by trade_date rows between 19 preceding and current row)) - 1"
    meaning: "5日均线与20日均线的偏离度（双均线交叉代理）。"
    usage_scenario: "捕捉中短期趋势的启动点或衡量趋势的强度。"
    strategy_hint: "经典 CTA 策略因子，也可用于股票多头策略的择时过滤。"

  # -------------------------------------------------------------------------
  # 类别 8: 财务质量 (Financial Quality) - 基于 Tushare 财务指标数据
  # -------------------------------------------------------------------------
  - name: "debt_to_assets"
    category: "财务质量"
    expression: 
      qlib: "$debt_to_assets"
      duckdb: "debt_to_assets"
    meaning: "资产负债率。反映企业的财务杠杆和长期偿债风险。"
    usage_scenario: "信用债违约高发期、熊市防守阶段。"
    strategy_hint: "负向因子，常用于剔除高杠杆、高风险的暴雷潜雷股。"

  - name: "current_ratio"
    category: "财务质量"
    expression: 
      qlib: "$current_ratio"
      duckdb: "current_ratio"
    meaning: "流动比率。反映企业短期偿债能力和资金周转状况。"
    usage_scenario: "全市场、尤其是现金流紧张的周期底部。"
    strategy_hint: "正向因子，但过高可能意味着资金闲置。主要用于剔除流动性枯竭的个股。"
    
  - name: "inv_turn"
    category: "财务质量"
    expression: 
      qlib: "$inv_turn"
      duckdb: "inv_turn"
    meaning: "存货周转率。反映企业存货管理的效率，数值越高说明存货变现速度越快。"
    usage_scenario: "制造业、零售业等强库存周期的行业。"
    strategy_hint: "正向因子，作为精细化运营能力的衡量指标。"
