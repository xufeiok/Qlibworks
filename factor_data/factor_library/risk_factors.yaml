name: risk_factors
version: '2.0'
strategy_type: risk_factors 因子合集
author: Quant
updated_at: '2026-04-22'
description: 风险因子库：包含波动率、Beta、解禁压力等用于风控和止损的因子。
analysis:
  pros: 分类清晰，完全符合系统化投研体系。
  cons: 部分另类因子需要底层数据支持。
  optimization_direction: 持续迭代新的因子表达式。
factors:
  - name: volatility_1m
    category: 波动率
    expression:
      qlib: Std(Abs($close/Ref($close,1)-1), 20)
      duckdb: "WITH daily_ret AS (SELECT ts_code, trade_date, close / NULLIF(LAG(close,1) OVER (PARTITION BY ts_code ORDER BY trade_date), 0) - 1 AS stock_ret FROM _raw) SELECT ts_code, trade_date, stddev(abs(stock_ret)) OVER (PARTITION BY ts_code ORDER BY trade_date ROWS BETWEEN 19 PRECEDING AND CURRENT ROW) AS value FROM daily_ret WHERE stock_ret IS NOT NULL ORDER BY ts_code, trade_date"
    meaning: 过去20个交易日的日收益率标准差。低波动率异象：A股中历史波动率低的股票，未来收益往往更高且回撤小。
    usage_scenario: 低波动率异象、多因子模型风控端、低波动率增强策略。
    strategy_hint: 负向因子，常用于剔除高波动个股，或构建低波红利策略。

  - name: beta
    category: 风险
    expression:
      qlib: $beta
      duckdb: "WITH daily_ret AS (SELECT ts_code, trade_date, close / NULLIF(LAG(close,1) OVER (PARTITION BY ts_code ORDER BY trade_date),0) - 1 AS stock_ret FROM _raw), mkt_ret AS (SELECT trade_date, AVG(stock_ret) AS mkt_ret FROM daily_ret WHERE stock_ret IS NOT NULL GROUP BY trade_date), combined AS (SELECT r.ts_code, r.trade_date, r.stock_ret, m.mkt_ret FROM daily_ret r JOIN mkt_ret m ON r.trade_date = m.trade_date WHERE r.stock_ret IS NOT NULL AND m.mkt_ret IS NOT NULL), rolled AS (SELECT ts_code, trade_date, CAST(COUNT(*) OVER w AS DOUBLE) AS n, SUM(stock_ret*mkt_ret) OVER w AS sum_xy, SUM(stock_ret) OVER w AS sum_x, SUM(mkt_ret) OVER w AS sum_y, SUM(mkt_ret*mkt_ret) OVER w AS sum_y2 FROM combined WINDOW w AS (PARTITION BY ts_code ORDER BY trade_date ROWS BETWEEN 59 PRECEDING AND CURRENT ROW)) SELECT ts_code, trade_date, CASE WHEN n*sum_y2-sum_y*sum_y>0 THEN (n*sum_xy-sum_x*sum_y)/(n*sum_y2-sum_y*sum_y) END AS value FROM rolled WHERE n>=20 ORDER BY ts_code, trade_date"
    meaning: Beta系数。DuckDB 滚动60日协方差回归计算。
    usage_scenario: 风控、过滤庄股
    strategy_hint: 视策略而定

  - name: shareholder_change
    category: 风险
    expression:
      qlib: $stk_holdernumber / Ref($stk_holdernumber, 20) - 1
    meaning: 股东人数变化。需 forward-fill 后做 LAG，走 Qlib 兜底。
    usage_scenario: 筹码集中度分析
    strategy_hint: 负向（减少代表集中）

  - name: pledge_ratio
    category: 风险
    expression:
      qlib: $pledge_ratio
      duckdb: pledge_ratio
    meaning: 质押比例
    usage_scenario: 防暴雷
    strategy_hint: 负向
