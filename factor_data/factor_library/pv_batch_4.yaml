  category: 滚动时间窗口 (Rolling)
  expression:
    qlib: (Sum(Greater($close-Ref($close, 1), 0), 60)-Sum(Greater(Ref($close, 1)-$close,
      0), 60))/(Sum(Abs($close-Ref($close, 1)), 60)+1e-12)
    duckdb: DuckDB暂未实现完整的Alpha158对应逻辑
  meaning: '【核心含义】

    多空收益差占比 (Sum Difference)：过去60天中多头与空头收益绝对量之和的差值占比。反映区间内多空绝对力量的净差。


