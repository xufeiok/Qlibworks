- name: WVMA5
  category: 滚动时间窗口 (Rolling)
  expression:
    qlib: Std(Abs($close/Ref($close, 1)-1)*$volume, 5)/(Mean(Abs($close/Ref($close,
      1)-1)*$volume, 5)+1e-12)
    duckdb: DuckDB暂未实现完整的Alpha158对应逻辑
  meaning: '【核心含义】

    波动加权成交量均值 (Weighted VMA)：过去5天以价格波动绝对值加权的成交量相对均值。反映大幅波动时的异常成交量特征。


    【运行原理】

    动能权重赋值：在N天滑动窗口内，先计算每日的价格绝对变化率（如：Abs(今日收盘/昨日收盘-1)），以此作为当日行情的“动能权重”；

    量能加权：将该动能权重乘上当日的成交量，得到“价格波动加权的成交量”序列；

    波动率计算：计算该加权成交量序列的标准差，并除以其均值进行无量纲化；

    极端行情捕捉：该指标能极其敏感地捕捉到“巨幅震荡且伴随天量”的极端变盘日，是识别市场情绪顶底的利器。'
  usage_scenario: 成交量异常波动与资金活跃度跟踪（过去5天）。
  strategy_hint: 量能是价格的先行指标。成交量骤增（VMA偏离）或波动率放大（VSTD）常意味着资金异动，需结合价格动量（如ROC）一起作为交叉特征输入。
