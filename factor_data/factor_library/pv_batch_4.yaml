- name: VSTD5
  category: 滚动时间窗口 (Rolling)
  expression:
    qlib: Std($volume, 5)/($volume+1e-12)
    duckdb: DuckDB暂未实现完整的Alpha158对应逻辑
  meaning: '【核心含义】

    成交量波动率 (Volume STD)：过去5天成交量的相对标准差。衡量交投活跃度的稳定性。


    【运行原理】

    量能波动提取：在N天的滑动窗口内，计算每日成交量序列的标准差(Std)，衡量资金参与热度的极热极冷切换频率；

    波动归一化：将计算出的成交量绝对标准差除以当前的最新成交量；

    筹码稳定性刻画：数值越大，说明近期时而极度缩量时而放出天量，筹码极不稳定；数值越小，说明每日成交量均匀平稳，资金运作有条短不紊。'
  usage_scenario: 成交量异常波动与资金活跃度跟踪（过去5天）。
  strategy_hint: 量能是价格的先行指标。成交量骤增（VMA偏离）或波动率放大（VSTD）常意味着资金异动，需结合价格动量（如ROC）一起作为交叉特征输入。
