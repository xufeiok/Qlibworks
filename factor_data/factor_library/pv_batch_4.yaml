  usage_scenario: 微观动量与买卖意愿度量（类似 RSI 的逻辑），刻画过去60天的绝对多空力量对比。
  strategy_hint: 相比于简单的区间收益率，这类因子揭示了上涨/下跌的过程（是缓慢爬升还是单日暴涨）。SUMD 越高说明多头推升力量越强且越稳定。
- name: VMA5
  category: 滚动时间窗口 (Rolling)
  expression:
    qlib: Mean($volume, 5)/($volume+1e-12)
    duckdb: DuckDB暂未实现完整的Alpha158对应逻辑
  meaning: '【核心含义】

    成交量移动平均 (Volume MA)：过去5天的成交量移动平均相对当前成交量的比值。反映成交量的近期均值回归状态。


    【运行原理】

    成交量聚合：在设定的N天时间窗口内，收集每一天的成交量(volume)；

    均量计算：对窗口内的所有成交量求简单算术平均数(Mean)，得到该周期的平均换手水平；

    放缩量换算：将计算出的移动平均成交量除以当前的最新成交量（分母加极小值防报错）；

    量能异动评估：结果若远小于1，说明当日剧烈放量；若大于1，说明当日缩量。用于判断当前交投活跃度相较于历史均值的异动情况。'
  usage_scenario: 成交量异常波动与资金活跃度跟踪（过去5天）。
  strategy_hint: 量能是价格的先行指标。成交量骤增（VMA偏离）或波动率放大（VSTD）常意味着资金异动，需结合价格动量（如ROC）一起作为交叉特征输入。
