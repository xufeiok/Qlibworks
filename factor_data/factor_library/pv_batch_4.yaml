name: pv_batch_4
version: '2.0'
strategy_type: 价量因子批次4 (共5批)
description: price_volume_factors 拆分第4批，共41个因子
factors:
- name: SUMD30
  category: 滚动时间窗口 (Rolling)
  expression:
    qlib: (Sum(Greater($close-Ref($close, 1), 0), 30)-Sum(Greater(Ref($close, 1)-$close,
      0), 30))/(Sum(Abs($close-Ref($close, 1)), 30)+1e-12)
    duckdb: DuckDB暂未实现完整的Alpha158对应逻辑
  meaning: '【核心含义】

    多空收益差占比 (Sum Difference)：过去30天中多头与空头收益绝对量之和的差值占比。反映区间内多空绝对力量的净差。


    【运行原理】

    涨跌拆解：在N天窗口内，计算每一天的价格变化绝对值，并区分出上涨日的变化量总和与下跌日的变化量总和；

    多空轧差：将上涨总和减去下跌总和，得到多空双方博弈后的“净动能”；

    基准归一化：将净动能除以这N天内所有价格变化绝对值的总和；

    净势能输出：结果在-1到1之间，类似于 RSI 的变体，正值代表多头主导的上涨趋势，负值代表空头主导的下跌趋势。'
  usage_scenario: 微观动量与买卖意愿度量（类似 RSI 的逻辑），刻画过去30天的绝对多空力量对比。
  strategy_hint: 相比于简单的区间收益率，这类因子揭示了上涨/下跌的过程（是缓慢爬升还是单日暴涨）。SUMD 越高说明多头推升力量越强且越稳定。
