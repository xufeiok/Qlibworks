name: pv_batch_missing_3
version: '2.0'
strategy_type: 缺失3个因子补跑
description: IMIN60/IMXD10/IMXD5 补评
factors:
- name: IMIN60
  category: 滚动时间窗口 (Rolling)
  expression:
    qlib: IdxMin($low, 60)/60
    duckdb: DuckDB暂未实现完整的Alpha158对应逻辑
  meaning: '【核心含义】

    最低价距离天数 (Index of Min)：过去60天中最低价发生在那一天。反映低点的时效性。


    【运行原理】

    极值寻址：在N天滑动窗口内，扫描每日最低价，定位到最小值出现的那一天；

    索引提取：获取该最小值距离窗口起始位置的时间索引(IdxMin)；

    时间归一化：将索引值除以窗口总长度N，转换为0到1之间的相对时间比例；

    见底时间评估：数值越大说明近期刚刚创出新低，抛压仍在释放；数值越小说明低点发生在窗口初期，目前可能已企稳反弹。'
  usage_scenario: 时间维度特征，寻找过去60天内极值发生的时间节点。
  strategy_hint: 高点发生得越近（IMAX越小），短期回调压力可能越大；结合动量因子能过滤掉'老热点'。
- name: IMXD10
  category: 滚动时间窗口 (Rolling)
  expression:
    qlib: (IdxMax($high, 10)-IdxMin($low, 10))/10
    duckdb: DuckDB暂未实现完整的Alpha158对应逻辑
  meaning: '【核心含义】

    高低点极值距离 (Index Distance)：过去10天内最高价和最低价发生天数的差值。反映趋势的运行节奏和周期。


    【运行原理】

    高点寻址：在N天窗口内找到最高价所在的时间索引(IdxMax)；

    低点寻址：在同一窗口内找到最低价所在的时间索引(IdxMin)；

    时差计算：将高点索引减去低点索引，得出极值点之间的时间跨度；

    跨度归一化：将时间跨度除以窗口长度N；

    趋势形态判定：正值表示“先见底后见顶”（上升趋势），负值表示“先见顶后见底”（下降趋势），绝对值大小代表趋势持续的时间跨度。'
  usage_scenario: 时间维度特征，寻找过去10天内极值发生的时间节点。
  strategy_hint: 高点发生得越近（IMAX越小），短期回调压力可能越大；结合动量因子能过滤掉'老热点'。
- name: IMXD5
  category: 滚动时间窗口 (Rolling)
  expression:
    qlib: (IdxMax($high, 5)-IdxMin($low, 5))/5
    duckdb: DuckDB暂未实现完整的Alpha158对应逻辑
  meaning: '【核心含义】

    高低点极值距离 (Index Distance)：过去5天内最高价和最低价发生天数的差值。反映趋势的运行节奏和周期。


    【运行原理】

    高点寻址：在N天窗口内找到最高价所在的时间索引(IdxMax)；

    低点寻址：在同一窗口内找到最低价所在的时间索引(IdxMin)；

    时差计算：将高点索引减去低点索引，得出极值点之间的时间跨度；

    跨度归一化：将时间跨度除以窗口长度N；

    趋势形态判定：正值表示“先见底后见顶”（上升趋势），负值表示“先见顶后见底”（下降趋势），绝对值大小代表趋势持续的时间跨度。'
  usage_scenario: 时间维度特征，寻找过去5天内极值发生的时间节点。
  strategy_hint: 高点发生得越近（IMAX越小），短期回调压力可能越大；结合动量因子能过滤掉'老热点'。
