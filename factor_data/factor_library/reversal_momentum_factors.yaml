factors:
  # ──────────────────────────────────────────────────────
  # 反转因子 (Reversal Factors)
  # ──────────────────────────────────────────────────────
  
  - name: STR_20d
    version: "1.0"
    category: "reversal"
    sub_category: "short_term"
    expression:
      qlib: "Ref($close / Ref($close, 20) - 1, 1) * (-1)"
      duckdb: |
        WITH ret AS (
          SELECT ts_code, trade_date,
                 close / LAG(close, 20) OVER (PARTITION BY ts_code ORDER BY trade_date) - 1 AS ret_20d
          FROM _raw
        )
        SELECT ts_code, trade_date, -1 * LAG(ret_20d, 1) OVER (PARTITION BY ts_code ORDER BY trade_date) AS value FROM ret
    logic:
      return_source: "close"
      theory: "短期过度反应后的均值回归"
      expected_direction: "positive"
    parameters:
      lookback: 20
      freq: "daily"
    data_source: "qlib"
    meaning: "过去20个交易日收益率取负，捕捉短期反转效应"
    ref: "Jegadeesh & Titman (1993)"
    lifecycle_stage: "active"

  - name: STR_5d
    version: "1.0"
    category: "reversal"
    sub_category: "short_term"
    expression:
      qlib: "Ref($close / Ref($close, 5) - 1, 1) * (-1)"
      duckdb: |
        WITH ret AS (
          SELECT ts_code, trade_date,
                 close / LAG(close, 5) OVER (PARTITION BY ts_code ORDER BY trade_date) - 1 AS ret_5d
          FROM _raw
        )
        SELECT ts_code, trade_date, -1 * LAG(ret_5d, 1) OVER (PARTITION BY ts_code ORDER BY trade_date) AS value FROM ret
    logic:
      return_source: "close"
      theory: "超短期过度反应后的快速修正"
      expected_direction: "positive"
    parameters:
      lookback: 5
      freq: "daily"
    data_source: "qlib"
    meaning: "过去5个交易日收益率取负，捕捉超短期反转效应"
    ref: "Lehmann (1990)"
    lifecycle_stage: "active"

  - name: LTR_12m
    version: "1.0"
    category: "reversal"
    sub_category: "long_term"
    expression:
      qlib: "Ref($close / Ref($close, 252) - 1, 20) * (-1)"
      duckdb: |
        WITH ret AS (
          SELECT ts_code, trade_date,
                 close / LAG(close, 252) OVER (PARTITION BY ts_code ORDER BY trade_date) - 1 AS ret_252d
          FROM _raw
        )
        SELECT ts_code, trade_date, -1 * LAG(ret_252d, 20) OVER (PARTITION BY ts_code ORDER BY trade_date) AS value FROM ret
    logic:
      return_source: "close"
      theory: "长期过度反应后的均值回归"
      expected_direction: "positive"
    parameters:
      lookback: 252
      freq: "daily"
    data_source: "qlib"
    meaning: "过去1年收益率取负（跳过最近20天），捕捉长期反转效应"
    ref: "De Bondt & Thaler (1985)"
    lifecycle_stage: "active"

  - name: VOL_REV
    version: "1.0"
    category: "reversal"
    sub_category: "volatility"
    expression:
      qlib: "Ref(Std($close / Ref($close, 1) - 1, 60), 1) * (-1)"
      duckdb: |
        WITH ret AS (
          SELECT ts_code, trade_date,
                 (close - LAG(close) OVER (PARTITION BY ts_code ORDER BY trade_date)) / LAG(close) OVER (PARTITION BY ts_code ORDER BY trade_date) AS ret_1d
          FROM _raw
        ),
        vol AS (
          SELECT ts_code, trade_date,
                 STDDEV_SAMP(ret_1d) OVER (PARTITION BY ts_code ORDER BY trade_date ROWS BETWEEN 59 PRECEDING AND CURRENT ROW) AS vol_60d
          FROM ret
        )
        SELECT ts_code, trade_date, -1 * LAG(vol_60d, 1) OVER (PARTITION BY ts_code ORDER BY trade_date) AS value FROM vol
    logic:
      return_source: "close"
      theory: "高波动率后的均值回归"
      expected_direction: "positive"
    parameters:
      lookback: 60
      freq: "daily"
    data_source: "qlib"
    meaning: "过去60日收益率标准差取负，捕捉波动率反转效应"
    ref: "French et al. (1987)"
    lifecycle_stage: "exploration"

  - name: EXTREME_REV
    version: "1.0"
    category: "reversal"
    sub_category: "extreme"
    expression:
      qlib: "If(Abs($close / Ref($close, 1) - 1) > 0.095, ($close / Ref($close, 1) - 1) * (-1), 0)"
      duckdb: "CASE WHEN ABS((close - LAG(close) OVER (PARTITION BY ts_code ORDER BY trade_date)) / NULLIF(LAG(close) OVER (PARTITION BY ts_code ORDER BY trade_date), 0)) > 0.095 THEN -((close - LAG(close) OVER (PARTITION BY ts_code ORDER BY trade_date)) / NULLIF(LAG(close) OVER (PARTITION BY ts_code ORDER BY trade_date), 0)) ELSE 0 END"
    logic:
      return_source: "close"
      theory: "涨停/跌停后的反转效应"
      expected_direction: "positive"
    parameters:
      lookback: 1
      freq: "daily"
    data_source: "qlib"
    meaning: "当日涨跌幅超过9.5%时取反，否则为0"
    ref: "A股特有现象"
    lifecycle_stage: "active"

  # ──────────────────────────────────────────────────────
  # 动量因子 (Momentum Factors)
  # ──────────────────────────────────────────────────────
  
  - name: MOM_6m
    version: "1.0"
    category: "momentum"
    sub_category: "medium_term"
    expression:
      qlib: "$close / Ref($close, 126) - 1"
      duckdb: "close / LAG(close, 126) OVER (PARTITION BY ts_code ORDER BY trade_date) - 1"
    logic:
      return_source: "close"
      theory: "中期价格趋势延续"
      expected_direction: "positive"
    parameters:
      lookback: 126
      freq: "daily"
    data_source: "qlib"
    meaning: "过去6个月收益率，捕捉中期动量效应"
    ref: "Jegadeesh & Titman (1993)"
    lifecycle_stage: "active"

  - name: MOM_12m
    version: "1.0"
    category: "momentum"
    sub_category: "long_term"
    expression:
      qlib: "$close / Ref($close, 252) - 1"
      duckdb: "close / LAG(close, 252) OVER (PARTITION BY ts_code ORDER BY trade_date) - 1"
    logic:
      return_source: "close"
      theory: "长期价格趋势延续"
      expected_direction: "positive"
    parameters:
      lookback: 252
      freq: "daily"
    data_source: "qlib"
    meaning: "过去1年收益率，捕捉长期动量效应"
    ref: "Carhart (1997)"
    lifecycle_stage: "active"

  - name: MOM_skip1m
    version: "1.0"
    category: "momentum"
    sub_category: "risk_adjusted"
    expression:
      qlib: "$close / Ref($close, 232) - 1"
      duckdb: "close / LAG(close, 232) OVER (PARTITION BY ts_code ORDER BY trade_date) - 1"
    logic:
      return_source: "close"
      theory: "跳过最近一个月避免短期反转干扰"
      expected_direction: "positive"
    parameters:
      lookback: 252
      skip: 20
      freq: "daily"
    data_source: "qlib"
    meaning: "过去1年收益率（跳过最近20天），避免短期反转干扰"
    ref: "Jegadeesh & Titman (2001)"
    lifecycle_stage: "active"

  - name: IND_NEUT_MOM
    version: "1.0"
    category: "momentum"
    sub_category: "industry_neutral"
    expression:
      qlib: "($close / Ref($close, 126) - 1 - $sw_industry_mean_ret_126) / $sw_industry_std_ret_126"
      duckdb: |
        WITH stock_ret AS (
          SELECT r.ts_code, r.trade_date,
                 r.close / LAG(r.close, 126) OVER (PARTITION BY r.ts_code ORDER BY r.trade_date) - 1 AS ret_126d,
                 i.sw_l1
          FROM _raw r
          LEFT JOIN _sw_industry i ON r.ts_code = i.ts_code
        ),
        ind_stats AS (
          SELECT trade_date, sw_l1,
                 AVG(ret_126d) AS ind_mean,
                 STDDEV_SAMP(ret_126d) AS ind_std
          FROM stock_ret
          WHERE sw_l1 IS NOT NULL AND ret_126d IS NOT NULL
          GROUP BY trade_date, sw_l1
        )
        SELECT s.ts_code, s.trade_date,
               (s.ret_126d - i.ind_mean) / NULLIF(i.ind_std, 0) AS value
        FROM stock_ret s
        LEFT JOIN ind_stats i ON s.trade_date = i.trade_date AND s.sw_l1 = i.sw_l1
        WHERE s.ret_126d IS NOT NULL AND i.ind_std IS NOT NULL AND i.ind_std > 0
    logic:
      return_source: "close"
      theory: "行业内标准化后的动量得分"
      expected_direction: "positive"
    parameters:
      lookback: 126
      freq: "daily"
    data_source: "qlib"
    meaning: "在申万一级行业内做Z-score标准化的6个月动量"
    ref: "Asness et al. (2013)"
    lifecycle_stage: "active"

  - name: MOM_ACCEL
    version: "1.0"
    category: "momentum"
    sub_category: "acceleration"
    expression:
      qlib: "($close / Ref($close, 63) - 1) - ($close / Ref($close, 126) - 1)"
      duckdb: "(close / LAG(close, 63) OVER (PARTITION BY ts_code ORDER BY trade_date) - 1) - (close / LAG(close, 126) OVER (PARTITION BY ts_code ORDER BY trade_date) - 1)"
    logic:
      return_source: "close"
      theory: "动量加速度，近期表现强于远期"
      expected_direction: "positive"
    parameters:
      lookback: 126
      freq: "daily"
    data_source: "qlib"
    meaning: "近期3个月动量减去过去6个月动量，衡量动量加速度"
    ref: "Chaves (2012)"
    lifecycle_stage: "exploration"
