- name: CORD5
  category: 滚动时间窗口 (Rolling)
  expression:
    qlib: Corr($close/Ref($close,1), Log($volume/Ref($volume, 1)+1), 5)
    duckdb: DuckDB暂未实现完整的Alpha158对应逻辑
  meaning: '【核心含义】

    量价收益率相关性 (Corr of Return/Volume)：过去5天价格收益率与成交量的相关系数。衡量上涨是否伴随放量。


    【运行原理】

    变化率提取：在设定时间窗口内，分别计算出每日的“价格收益率”(当日收盘/昨日收盘) 和“对数成交量变化率”(Log(当日成交量/昨日成交量+1))；

    序列配对：将这两个时间序列组成配对样本；

    相关性计算：计算这两个序列在N天内的皮尔逊(Pearson)相关系数；

    量价剖析：结果介于-1到1之间，正值代表量价齐升/缩量下跌，负值代表放量下跌/缩量上涨，用于洞察资金推动价格的真实效率。'
  usage_scenario: 量价配合度分析，验证过去5天的趋势是否得到资金支持。
  strategy_hint: 传统技术分析认为'量价齐升'是健康的，CORR为正且价格上涨通常信号更强。树模型可自动挖掘量价背离的负面信号。
