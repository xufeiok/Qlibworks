name: pv_batch_3
version: '2.0'
strategy_type: 价量因子批次3 (共5批)
description: price_volume_factors 拆分第3批，共41个因子
factors:
- name: IMXD20
  category: 滚动时间窗口 (Rolling)
  expression:
    qlib: (IdxMax($high, 20)-IdxMin($low, 20))/20
    duckdb: DuckDB暂未实现完整的Alpha158对应逻辑
  meaning: '【核心含义】

    高低点极值距离 (Index Distance)：过去20天内最高价和最低价发生天数的差值。反映趋势的运行节奏和周期。


    【运行原理】

    高点寻址：在N天窗口内找到最高价所在的时间索引(IdxMax)；

    低点寻址：在同一窗口内找到最低价所在的时间索引(IdxMin)；

    时差计算：将高点索引减去低点索引，得出极值点之间的时间跨度；

    跨度归一化：将时间跨度除以窗口长度N；

    趋势形态判定：正值表示“先见底后见顶”（上升趋势），负值表示“先见顶后见底”（下降趋势），绝对值大小代表趋势持续的时间跨度。'
  usage_scenario: 时间维度特征，寻找过去20天内极值发生的时间节点。
  strategy_hint: 高点发生得越近（IMAX越小），短期回调压力可能越大；结合动量因子能过滤掉'老热点'。
