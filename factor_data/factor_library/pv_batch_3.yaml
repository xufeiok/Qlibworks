  meaning: '【核心含义】

    正收益绝对值占比 (Sum Positive)：过去5天中所有正收益之和占总绝对收益的比例。反映多头拉升的绝对力量（类似RSI的核心思想）。


    【运行原理】

    多头剥离：在N天的滑动窗口内，逐日比对收盘价，仅提取出上涨交易日（今日收盘>昨日收盘）的上涨绝对点数；

    多头动能累加：将这N天内的所有上涨点数进行求和；

    基准归一化：将多头总动能除以这N天内所有价格变化（无论涨跌）的绝对值总和；

    多方势能评估：结果在0到1之间，本质上是经典的相对强弱指标(RSI)的计算内核，反映多头在整体波动中的支配地位。'
