    duckdb: DuckDB暂未实现完整的Alpha158对应逻辑
  meaning: |-
    【核心含义】
    K线重心偏移占振幅比例：标准化后的重心偏移，+1表示收在最高，-1表示收在最低，是极佳的日内动量指标。

    【运行原理】
    中枢计算：获取当日的最高价、最低价和收盘价，(2*收盘价 - 最高价 - 最低价) 相当于评估收盘价在全天振幅(High-Low)中的相对偏移位置（偏移重心的两倍）；
    相对基准：将上述偏移量除以当日开盘价(open)；
    重心偏移度：用于刻画最终收盘时，多空力量将价格推离日内均衡中枢的程度，正值偏多，负值偏空。
  usage_scenario: 日内微观结构分析、短期反转与动量捕获。适合中高频策略的特征输入。
  strategy_hint: 此类因子捕捉了日内的多空博弈。例如长下影线（KLOW2）在连续下跌后常暗示反转；长上影线（KUP2）在高位暗示抛压。树模型能很好地利用其非线性特征。

- name: OPEN0
  category: 归一化价格 (Price)
  expression:
    qlib: $open/$close
    duckdb: DuckDB暂未实现完整的Alpha158对应逻辑
  meaning: |-
    【核心含义】
    相对收盘的开盘价：衡量今日开盘价相对于最新收盘价的位置，反映隔夜跳空与日内波动的综合结果。

    【运行原理】
    数据截取：获取当前单个交易日的开盘价(open)和收盘价(close)；
    相对换算：将开盘价直接除以收盘价；
    日内演变：若大于1，说明高开低走（收阴）；若小于1，说明低开高走（收阳）。该值直观呈现了日内交易时段价格的整体漂移方向。
  usage_scenario: 日内价格相对位置锚定。常用于刻画日内的超买超卖状态。
  strategy_hint: 主要作为基础刻画特征，VWAP0 能够很好地代表主力资金当天的平均建仓成本位置，配合次日表现可做动量判断。

- name: HIGH0
  category: 归一化价格 (Price)
  expression:
    qlib: $high/$close
    duckdb: DuckDB暂未实现完整的Alpha158对应逻辑
  meaning: |-
    【核心含义】
    相对收盘的最高价：衡量今日最高价相对于最新收盘价的位置，反映日内高点回落的幅度。

    【运行原理】
    数据截取：仅获取当前单个交易日的最高价(high)和收盘价(close)；
    相对换算：将当日最高价直接除以当日收盘价；
    溢价刻画：结果必然大于或等于1，数值越大，说明日内曾经冲高但最终回落的幅度越深，反映出上方抛压的沉重程度（即长上影线的变体表达）。
  usage_scenario: 日内价格相对位置锚定。常用于刻画日内的超买超卖状态。
  strategy_hint: 主要作为基础刻画特征，VWAP0 能够很好地代表主力资金当天的平均建仓成本位置，配合次日表现可做动量判断。

