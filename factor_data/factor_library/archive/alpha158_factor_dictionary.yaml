    跨度归一化：将时间跨度除以窗口长度N；
    趋势形态判定：正值表示“先见底后见顶”（上升趋势），负值表示“先见顶后见底”（下降趋势），绝对值大小代表趋势持续的时间跨度。
  usage_scenario: 时间维度特征，寻找过去5天内极值发生的时间节点。
  strategy_hint: 高点发生得越近（IMAX越小），短期回调压力可能越大；结合动量因子能过滤掉'老热点'。

