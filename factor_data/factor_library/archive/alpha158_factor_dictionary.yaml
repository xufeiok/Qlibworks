- name: STD5
  category: 滚动时间窗口 (Rolling)
  expression:
    qlib: Std($close, 5)/$close
    duckdb: DuckDB暂未实现完整的Alpha158对应逻辑
  meaning: |-
    【核心含义】
    价格波动率 (Standard Deviation)：过去5天价格的相对标准差。衡量股票在该窗口期内的波动风险和活跃度。

    【运行原理】
    波动离散：在N天的滑动窗口内，计算每日收盘价序列的总体标准差(Std)，衡量价格分布的离散程度；
    波动率归一化：将计算出的绝对标准差除以当前的最新收盘价；
    风险刻画：将绝对的金额波动转化为相对的百分比波动率，数值越大说明近期走势越剧烈（风险与弹性高），数值越小说明走势越趋于横盘死水。
  usage_scenario: 刻画过去5天的趋势质量与波动风险。用于波动率控制和趋势平滑度筛选。
  strategy_hint: 低波动（STD小）、高线性度（RSQR大）的股票往往具有更好的上涨持续性；残差（RESI）过大往往意味着趋势即将破坏。

