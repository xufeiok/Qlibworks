    duckdb: DuckDB暂未实现完整的Alpha158对应逻辑
  meaning: |-
    【核心含义】
    价格相对排位 (Rank)：当前价格在过去5天价格中的百分比排位。反映当前处于近期波动区间的什么水平。

    【运行原理】
    数据收集：在N天的滑动窗口内，收集每日的收盘价；
