name: alpha158_factor_dictionary
version: '1.0'
strategy_type: Alpha158因子集
author: Quant
updated_at: '2026-04-04'
description: 这是经典的 Alpha158 因子集，包含了 Qlib 默认的量价、滚动窗口和 K 线特征。该因子集常用于传统机器学习模型的基准测试和特征输入。
analysis:
  pros: 覆盖面广，包含了股票市场最常用的量价时序特征，适合 GBDT 等树模型直接使用。
  cons: 由于包含大量高度相关的特征，直接使用可能存在多重共线性问题；缺乏财务基本面和另类数据。
  optimization_direction: 可结合 master_factor_dictionary 中的估值和成长因子，构建更全面的多因子模型。
factors:

- name: KMID
  category: 量价K线 (K-Bar)
  expression:
    qlib: ($close-$open)/$open
    duckdb: DuckDB暂未实现完整的Alpha158对应逻辑
  meaning: |-
    【核心含义】
    K线实体比例：衡量开盘与收盘之间的价格变动（实体），反映日内多空力量的净胜出程度。正值表示多头占优，负值表示空头占优。

    【运行原理】
    开收对比：读取单日 K 线的开盘价(open)和收盘价(close)；
    实体计算：计算收盘价减去开盘价的差额，获取 K 线实体的绝对方向与长度；
    无量纲转换：将实体长度除以开盘价，转化为相对于开盘的涨跌百分比；
    多空定调：正值代表日内多头净胜，负值代表空头净胜，完全剔除了日内最高/最低价的极端波动干扰。
  usage_scenario: 日内微观结构分析、短期反转与动量捕获。适合中高频策略的特征输入。
  strategy_hint: 此类因子捕捉了日内的多空博弈。例如长下影线（KLOW2）在连续下跌后常暗示反转；长上影线（KUP2）在高位暗示抛压。树模型能很好地利用其非线性特征。

- name: KLEN
  category: 量价K线 (K-Bar)
  expression:
    qlib: ($high-$low)/$open
    duckdb: DuckDB暂未实现完整的Alpha158对应逻辑
  meaning: |-
    【核心含义】
    K线全长比例：衡量日内最高价与最低价之间的整体波动幅度，反映日内整体的交易活跃度与分歧。

    【运行原理】
    日内振幅提取：获取当日的最高价(high)和最低价(low)，两者的差值即为全天价格的最大波动区间；
    基准标定：获取当日的开盘价(open)作为日内波动的基准参考；
    无量纲化：将全天波动区间除以开盘价；
    波动率刻画：结果反映了单日内多空双方交战的激烈程度，数值越大说明日内分歧和洗盘越剧烈。
  usage_scenario: 日内微观结构分析、短期反转与动量捕获。适合中高频策略的特征输入。
  strategy_hint: 此类因子捕捉了日内的多空博弈。例如长下影线（KLOW2）在连续下跌后常暗示反转；长上影线（KUP2）在高位暗示抛压。树模型能很好地利用其非线性特征。

- name: KMID2
  category: 量价K线 (K-Bar)
  expression:
    qlib: ($close-$open)/($high-$low+1e-12)
    duckdb: DuckDB暂未实现完整的Alpha158对应逻辑
  meaning: |-
    【核心含义】
    K线实体占振幅比例：衡量K线实体占全天总振幅的比例，体现趋势的坚决程度。值越接近1说明趋势越单边。

    【运行原理】
    开收对比：读取单日 K 线的开盘价(open)和收盘价(close)；
    实体计算：计算收盘价减去开盘价的差额，获取 K 线实体的绝对方向与长度；
    无量纲转换：将实体长度除以开盘价，转化为相对于开盘的涨跌百分比；
    多空定调：正值代表日内多头净胜，负值代表空头净胜，完全剔除了日内最高/最低价的极端波动干扰。
  usage_scenario: 日内微观结构分析、短期反转与动量捕获。适合中高频策略的特征输入。
  strategy_hint: 此类因子捕捉了日内的多空博弈。例如长下影线（KLOW2）在连续下跌后常暗示反转；长上影线（KUP2）在高位暗示抛压。树模型能很好地利用其非线性特征。

- name: KUP
  category: 量价K线 (K-Bar)
  expression:
    qlib: ($high-Greater($open, $close))/$open
    duckdb: DuckDB暂未实现完整的Alpha158对应逻辑
  meaning: |-
    【核心含义】
    K线上影线比例：衡量日内最高价到实体上边缘的距离，反映日内多头向上试探后被空头打压的程度。

    【运行原理】
    形态截取：获取单日的最高价(high)与收盘价(close)；
    上影线（或实体上部）计算：计算最高价与收盘价之差，代表多头冲高后被空头打压回落的空间；
    比例换算：将回落空间除以当日开盘价(open)进行标准化；
    抛压测试：数值越大，说明日内冲高回落的阻力越强，上方套牢盘或抛压越重。
  usage_scenario: 日内微观结构分析、短期反转与动量捕获。适合中高频策略的特征输入。
  strategy_hint: 此类因子捕捉了日内的多空博弈。例如长下影线（KLOW2）在连续下跌后常暗示反转；长上影线（KUP2）在高位暗示抛压。树模型能很好地利用其非线性特征。

- name: KUP2
  category: 量价K线 (K-Bar)
  expression:
    qlib: ($high-Greater($open, $close))/($high-$low+1e-12)
    duckdb: DuckDB暂未实现完整的Alpha158对应逻辑
  meaning: |-
    【核心含义】
    K线上影线占全天振幅比例：上影线长度在全天振幅中的占比，值越大说明上方抛压越重，多头遇阻回落。

    【运行原理】
    形态截取：获取单日的最高价(high)与收盘价(close)；
    上影线（或实体上部）计算：计算最高价与收盘价之差，代表多头冲高后被空头打压回落的空间；
    比例换算：将回落空间除以当日开盘价(open)进行标准化；
    抛压测试：数值越大，说明日内冲高回落的阻力越强，上方套牢盘或抛压越重。
  usage_scenario: 日内微观结构分析、短期反转与动量捕获。适合中高频策略的特征输入。
  strategy_hint: 此类因子捕捉了日内的多空博弈。例如长下影线（KLOW2）在连续下跌后常暗示反转；长上影线（KUP2）在高位暗示抛压。树模型能很好地利用其非线性特征。

- name: KLOW
  category: 量价K线 (K-Bar)
  expression:
    qlib: (Less($open, $close)-$low)/$open
    duckdb: DuckDB暂未实现完整的Alpha158对应逻辑
  meaning: |-
    【核心含义】
    K线下影线比例：衡量实体下边缘到日内最低价的距离，反映日内空头向下试探后被多头托起的程度。

    【运行原理】
    形态截取：获取当日的收盘价(close)和最低价(low)；
    下影线（或实体下部）计算：计算两者之间的绝对差值，代表价格从日内低点被拉回（或砸下）的空间；
    比例换算：将该差值除以当日开盘价(open)进行标准化；
    支撑测试：该指标用于刻画下方买盘的承接力度，数值越大说明日内探底回升的动作越明显。
  usage_scenario: 日内微观结构分析、短期反转与动量捕获。适合中高频策略的特征输入。
  strategy_hint: 此类因子捕捉了日内的多空博弈。例如长下影线（KLOW2）在连续下跌后常暗示反转；长上影线（KUP2）在高位暗示抛压。树模型能很好地利用其非线性特征。

