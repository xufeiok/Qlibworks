- name: CNTP5
  category: 滚动时间窗口 (Rolling)
  expression:
    qlib: Mean($close>Ref($close, 1), 5)
    duckdb: DuckDB暂未实现完整的Alpha158对应逻辑
  meaning: |-
    【核心含义】
    上涨天数占比 (Count Positive)：过去5天中收益率为正的天数占比。反映多头占据优势的交易日频率。

    【运行原理】
    涨势识别：逐日对比过去N天收盘价与前一交易日收盘价，提取出“当日收盘价 > 前日收盘价”的阳线（上涨日）并标记为1，其余为0；
    概率统计：对该布尔序列在时间窗口内求均值，得出上涨交易日所占的百分比；
    情绪刻画：数值越接近1，表明区间内股票连涨天数越多，市场处于强势的多头逼空状态或极度乐观情绪中。
  usage_scenario: 微观动量与买卖意愿度量（类似 RSI 的逻辑），刻画过去5天的绝对多空力量对比。
  strategy_hint: 相比于简单的区间收益率，这类因子揭示了上涨/下跌的过程（是缓慢爬升还是单日暴涨）。SUMD 越高说明多头推升力量越强且越稳定。

