    相对收盘的最低价：衡量今日最低价相对于最新收盘价的位置，反映日内低点反弹的幅度。

    【运行原理】
    数据截取：仅获取当前单个交易日的最低价(low)和收盘价(close)；
    相对换算：将当日最低价直接除以当日收盘价；
    折价刻画：结果必然小于或等于1，数值越小，说明日内曾经深度下探但最终被强力拉回，反映出下方承接盘的厚度（长下影线的变体表达）。
  usage_scenario: 日内价格相对位置锚定。常用于刻画日内的超买超卖状态。
  strategy_hint: 主要作为基础刻画特征，VWAP0 能够很好地代表主力资金当天的平均建仓成本位置，配合次日表现可做动量判断。

- name: VWAP0
  category: 归一化价格 (Price)
  expression:
    qlib: $vwap/$close
    duckdb: DuckDB暂未实现完整的Alpha158对应逻辑
  meaning: |-
    【核心含义】
    相对收盘的均价：衡量全天成交均价相对于收盘价的位置，用于判断收盘价是高于还是低于全天平均成本。

    【运行原理】
    均价提取：获取当前交易日的成交量加权平均价(VWAP)，该价格代表了全天所有买卖单的真实平均建仓成本；
    收盘比对：获取当日的最终收盘价(close)；
    折溢价换算：将 VWAP 直接除以收盘价；
    日内盈亏评估：若结果大于1，说明收盘价跌破了全天均价，日内入场的大部分资金处于浮亏状态（偏空）；若小于1，则大部分资金实现浮盈（偏多）。
  usage_scenario: 日内价格相对位置锚定。常用于刻画日内的超买超卖状态。
  strategy_hint: 主要作为基础刻画特征，VWAP0 能够很好地代表主力资金当天的平均建仓成本位置，配合次日表现可做动量判断。

- name: ROC5
  category: 滚动时间窗口 (Rolling)
  expression:
    qlib: Ref($close, 5)/$close
    duckdb: DuckDB暂未实现完整的Alpha158对应逻辑
  meaning: |-
    【核心含义】
    收益率 (Rate of Change)：过去5天的价格变动率。反映股票在5天内的动量或反转特性。

    【运行原理】
    基准定位：在设定的N天时间窗口中，精确定位到窗口最左侧（期初）的收盘价；
    价格比对：获取窗口最右侧（当前）的最新收盘价；
    变动换算：计算当前价格相对于期初价格的比值，或计算两者的差值后再除以期初价格；
    动量输出：直接刻画该时间区间内整体的价格涨跌幅（动量效应），窗口逐日滑动，实时输出最新收益率。
  usage_scenario: 捕捉过去5天的动量与均线乖离。
  strategy_hint: 短期（如5天、10天）常表现为反转特征（均值回归），中长期（如20天、60天）常表现为动量特征（趋势延续）。线性模型中需注意方向反转，非线性模型会自动切分阈值。

