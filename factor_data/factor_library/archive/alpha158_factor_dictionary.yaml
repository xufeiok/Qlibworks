- name: RESI5
  category: 滚动时间窗口 (Rolling)
  expression:
    qlib: Resi($close, 5)/$close
    duckdb: DuckDB暂未实现完整的Alpha158对应逻辑
  meaning: |-
    【核心含义】
    价格趋势残差 (Residual)：过去5天价格线性回归的残差相对值。衡量价格偏离其线性趋势的程度，反映短期超买或超卖。

    【运行原理】
    数据准备：以时间序列（1到N）作为自变量，N天内的收盘价作为因变量；
    线性拟合：对这两组数据进行普通最小二乘法(OLS)线性回归，得到一条代表整体趋势的最佳拟合直线；
    残差提取：计算当前最新收盘价与该拟合直线在当天的预测值之间的差值（残差 Resi）；
    残差归一化：将残差除以当前的收盘价；
    异动捕捉：过滤掉线性的平稳趋势后，剩下的残差反映了价格的非线性突变或异常波动（超买/超卖程度）。
  usage_scenario: 刻画过去5天的趋势质量与波动风险。用于波动率控制和趋势平滑度筛选。
  strategy_hint: 低波动（STD小）、高线性度（RSQR大）的股票往往具有更好的上涨持续性；残差（RESI）过大往往意味着趋势即将破坏。

