- name: BETA5
  category: 滚动时间窗口 (Rolling)
  expression:
    qlib: Slope($close, 5)/$close
    duckdb: DuckDB暂未实现完整的Alpha158对应逻辑
  meaning: |-
    【核心含义】
    价格趋势斜率 (Beta/Slope)：过去5天价格序列对时间的线性回归斜率。代表价格的上涨或下跌趋势强度。

    【运行原理】
    数据读取：按设定的时间窗口（如5天）提取标的资产的每日收盘价序列；
    线性拟合：将时间序列作为自变量，收盘价作为因变量，进行普通最小二乘法(OLS)线性回归；
    斜率提取：获取该回归方程的斜率(Slope)，代表资产价格随时间的平均绝对增长率；
    价格归一化：将提取出的斜率值除以当前的最新收盘价，将绝对变化率转化为无量纲的相对变化率，以消除不同高低价股位带来的尺度差异。
  usage_scenario: 刻画过去5天的趋势质量与波动风险。用于波动率控制和趋势平滑度筛选。
  strategy_hint: 低波动（STD小）、高线性度（RSQR大）的股票往往具有更好的上涨持续性；残差（RESI）过大往往意味着趋势即将破坏。

