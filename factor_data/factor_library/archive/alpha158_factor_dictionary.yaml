- name: IMAX5
  category: 滚动时间窗口 (Rolling)
  expression:
    qlib: IdxMax($high, 5)/5
    duckdb: DuckDB暂未实现完整的Alpha158对应逻辑
  meaning: |-
    【核心含义】
    最高价距离天数 (Index of Max)：过去5天中最高价发生在那一天（距离当前的倒数天数）。反映高点的时效性。

    【运行原理】
    极值寻址：在设定的N天时间窗口内，扫描每日的最高价，定位到最大值出现的那一天；
    索引提取：获取该最大值所在天数距离当前窗口起始点的索引位置(IdxMax)；
    时间归一化：将该位置索引除以窗口总长度N；
    动能衰减评估：结果越接近1，说明创出新高的时间越近（近期动能强）；越接近0，说明高点在窗口早期，当前处于长期回调中。
  usage_scenario: 时间维度特征，寻找过去5天内极值发生的时间节点。
  strategy_hint: 高点发生得越近（IMAX越小），短期回调压力可能越大；结合动量因子能过滤掉'老热点'。

