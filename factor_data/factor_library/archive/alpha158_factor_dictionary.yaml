    空头量能累加：将符合条件的下跌量能进行加总；
    总基准归一化：将总的空头量能除以这N天内所有的成交量绝对变化之和；
    恐慌抛盘评估：数值越大，说明该区间内的波动主要由恐慌性的放量杀跌所主导。
  usage_scenario: 成交量异常波动与资金活跃度跟踪（过去10天）。
  strategy_hint: 量能是价格的先行指标。成交量骤增（VMA偏离）或波动率放大（VSTD）常意味着资金异动，需结合价格动量（如ROC）一起作为交叉特征输入。

