- name: RSV5
  category: 滚动时间窗口 (Rolling)
  expression:
    qlib: ($close-Min($low, 5))/(Max($high, 5)-Min($low, 5)+1e-12)
    duckdb: DuckDB暂未实现完整的Alpha158对应逻辑
  meaning: |-
    【核心含义】
    未成熟随机值 (Raw Stochastic Value)：KDJ指标的计算基础，(当前价-最低价)/(最高价-最低价)，反映当前价格在过去5天极值区间的相对强弱。

    【运行原理】
    极值扫描：在N天滑动窗口内，同时找出全局最高价(Max)和全局最低价(Min)，确定该区间的绝对波动范围；
    相对位置计算：计算当前最新收盘价减去全局最低价的差额；
    KD基石换算：将该差额除以总波动范围（最高价-最低价），得到未成熟随机值(RSV)；
    超买超卖界定：结果在0到1之间，直观标定当前价格处于近期波动箱体的什么水位（如0.8以上为超买区，0.2以下为超卖区）。
  usage_scenario: 识别过去5天的支撑阻力位及超买超卖状态（如震荡市的区间交易）。
  strategy_hint: RSV 和 RANK 常用于构建类似于 KDJ 或 Williams %R 的技术指标，值接近极值（如超80%或低于20%）时反转概率大。

