- name: MAX5
  category: 滚动时间窗口 (Rolling)
  expression:
    qlib: Max($high, 5)/$close
    duckdb: DuckDB暂未实现完整的Alpha158对应逻辑
  meaning: |-
    【核心含义】
    区间最高价相对值 (Max)：过去5天的最高价相对当前价格的比值。反映当前价格距离前期高点的距离（阻力位）。

    【运行原理】
    极值扫描：在设定的N天滑动窗口内，遍历每一天的最高价；
    峰值提取：找出这N天中的全局最高价(Max)；
    压力位归一化：将提取出的历史最高价除以当前的最新收盘价；
    破顶距离刻画：数值反映了当前价格距离近期前高的空间。数值越接近1，说明越有突破前高的可能；数值越大，说明距离前高越远，处于深幅回调中。
  usage_scenario: 识别过去5天的支撑阻力位及超买超卖状态（如震荡市的区间交易）。
  strategy_hint: RSV 和 RANK 常用于构建类似于 KDJ 或 Williams %R 的技术指标，值接近极值（如超80%或低于20%）时反转概率大。

