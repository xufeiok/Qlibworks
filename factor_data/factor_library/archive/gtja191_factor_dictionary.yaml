name: gtja191_factor_dictionary
version: '1.0'
strategy_type: 国泰君安191 Alpha因子集
author: Quant
updated_at: '2026-04-04'
description: 国泰君安191个短周期量价特征因子，广泛应用于高频和中高频量化交易中。该因子集基于量价特征挖掘短周期的反转与动量效应。
analysis:
  pros: 因子数量庞大且覆盖多种量价逻辑（动量、反转、量价相关性等），非常适合作为机器学习模型的输入池，挖掘非线性关系。
  cons: 由于全部为量价因子，同质化较高，且在不同市场环境下的衰减较快；部分公式极度复杂，计算开销较大。
  optimization_direction: 可结合 master_factor_dictionary 中的基本面因子进行正交化处理；利用特征选择算法（如Lasso、树模型特征重要性）剔除冗余因子。
factors:
- name: Alpha1
  category: 量价综合 (Price-Volume Synthetic)
  expression:
    qlib: (-1 * Corr(Rank(Delta(Log($volume),1)),Rank((($close-$open)/$open)),6))
    duckdb: (-1 * CORR(PERCENT_RANK() OVER (PARTITION BY trade_date ORDER BY (LN(volume) - LAG(LN(volume), 1) OVER 
      (PARTITION BY ts_code ORDER BY trade_date))), PERCENT_RANK() OVER (PARTITION BY trade_date ORDER BY 
      ((close-open)/open))) OVER (PARTITION BY ts_code ORDER BY trade_date ROWS BETWEEN 5 PRECEDING AND CURRENT ROW))
  meaning: |-
    【原始公式】
    (-1 * CORR(RANK(DELTA(LOG(VOLUME),1)),RANK(((CLOSE-OPEN)/OPEN)),6)

    【核心含义】
    国泰君安191因子体系中的 Alpha1 因子。具体业务含义参考原始研报公式解析。
  usage_scenario: 短周期多空博弈、量价背离与动量反转。
  strategy_hint: 高频与中频量价特征。建议作为 LightGBM / CatBoost 等树模型的特征集。
