      CURRENT ROW))) THEN 1 ELSE (CASE WHEN ((1<(volume/AVG(volume) OVER (PARTITION BY ts_code ORDER BY trade_date ROWS 
      BETWEEN 19 PRECEDING AND CURRENT ROW)))  OR  ((volume/AVG(volume) OVER (PARTITION BY ts_code ORDER BY trade_date 
      ROWS BETWEEN 19 PRECEDING AND CURRENT ROW))==1)) THEN 1 ELSE (-1*1) END) END) END)
