      ROW)/8)+STDDEV_SAMP(close) OVER (PARTITION BY ts_code ORDER BY trade_date ROWS BETWEEN 7 PRECEDING AND CURRENT 
      ROW))<(SUM(close) OVER (PARTITION BY ts_code ORDER BY trade_date ROWS BETWEEN 1 PRECEDING AND CURRENT ROW)/2)) 
