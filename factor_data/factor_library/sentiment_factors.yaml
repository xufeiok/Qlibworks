name: sentiment_factors
version: '2.0'
strategy_type: sentiment_factors 因子合集
author: Quant
updated_at: '2026-04-22'
description: 情绪因子库：包含一致预期、北向资金、融资余额等反应市场情绪的因子。
analysis:
  pros: 分类清晰，完全符合系统化投研体系。
  cons: 部分另类因子需要底层数据支持。
  optimization_direction: 持续迭代新的因子表达式。
factors:
  - name: eps_forecast_yoy
    category: 情绪
    expression:
      qlib: ($eps_forecast / Ref($eps_last, 240)) - 1
      duckdb: (eps_forecast / eps) - 1
    meaning: 预期净利润增速（eps_last 缺失，改用 eps 替代）
    usage_scenario: 抓预期差、拐点
    strategy_hint: 正向
