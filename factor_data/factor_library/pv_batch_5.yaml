- name: momentum_1m
  category: 动量与反转
  expression:
    qlib: ($close - Ref($close, 20)) / Ref($close, 20)
    duckdb: (close - lag(close, 20) over (partition by ts_code order by trade_date))
      / lag(close, 20) over (partition by ts_code order by trade_date)
  meaning: 过去20个交易日的收益率（月度动量）。
  usage_scenario: 适合中高频选股策略。A股存在短期的反转效应和中长期的动量效应。
  strategy_hint: 通常与基本面因子结合，作为趋势跟随策略的核心因子。
- name: ma_cross_5_20
  category: 技术面
  expression:
    qlib: Mean($close, 5) / Mean($close, 20) - 1
    duckdb: (avg(close) over (partition by ts_code order by trade_date rows between
      4 preceding and current row)) / (avg(close) over (partition by ts_code order
      by trade_date rows between 19 preceding and current row)) - 1
  meaning: 5日均线与20日均线的偏离度（双均线交叉代理）。
  usage_scenario: 捕捉中短期趋势的启动点或衡量趋势的强度。
  strategy_hint: 经典 CTA 策略因子，也可用于股票多头策略的择时过滤。
- name: short_reversal
  category: 反转
  expression:
    qlib: ($close - Ref($close, 5)) / Ref($close, 5)
    duckdb: (close - lag(close, 5) over (partition by ts_code order by trade_date))
      / lag(close, 5) over (partition by ts_code order by trade_date)
  meaning: 5日收益率。周频核心反转因子，通常与下周收益呈负相关（跌得多的容易反弹）。
  usage_scenario: 周频调仓模型、超跌反弹策略。
  strategy_hint: 负向因子（需取反或作为排序的倒序指标），适合在宽幅震荡市捕捉短期超跌标的。
- name: volume_surge
  category: 流动性
  expression:
    qlib: Mean($volume, 5) / Mean($volume, 60)
    duckdb: (avg(vol) over (partition by ts_code order by trade_date rows between
      4 preceding and current row)) / (avg(vol) over (partition by ts_code order by
      trade_date rows between 59 preceding and current row))
  meaning: 5日均量除以60日均量。捕捉近期资金温和活跃的标的，避免买入死水股。
  usage_scenario: 量价配合策略，验证价格反弹的有效性。
  strategy_hint: 正向因子，反转必须有资金配合，但要避免极端放量（如单日换手过高）。
- name: long_momentum
  category: 动量
  expression:
    qlib: ($close - Ref($close, 60)) / Ref($close, 60)
    duckdb: (close - lag(close, 60) over (partition by ts_code order by trade_date))
      / lag(close, 60) over (partition by ts_code order by trade_date)
  meaning: 60日收益率。中期动量因子，筛选出中期处于上升通道的股票。
  usage_scenario: 趋势跟随策略的基础池筛选。
  strategy_hint: 正向因子，大前提是股票处于中期上升趋势中，然后再利用短期反转寻找上车点。
