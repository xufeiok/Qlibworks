- name: CNTD5
  category: 滚动时间窗口 (Rolling)
  expression:
    qlib: Mean($close>Ref($close, 1), 5)-Mean($close<Ref($close, 1), 5)
    duckdb: DuckDB暂未实现完整的Alpha158对应逻辑
  meaning: '【核心含义】

    涨跌天数差值 (Count Difference)：过去5天中上涨天数与下跌天数占比的差值。直接反映多空天数力量对比。


    【运行原理】

    涨跌识别：逐日对比过去N天的收盘价与前一交易日收盘价，分别标记为上涨日和下跌日；

    频率统计：在设定窗口内，分别计算上涨日出现的平均概率（多头占比）和下跌日出现的平均概率（空头占比）；

    净胜计算：将上涨概率减去下跌概率，得出多空双方在此区间的“净胜频次占比”；

    特征输出：正值说明多头占优，负值说明空头占优，每日随着窗口前移而动态更新。'
  usage_scenario: 微观动量与买卖意愿度量（类似 RSI 的逻辑），刻画过去5天的绝对多空力量对比。
  strategy_hint: 相比于简单的区间收益率，这类因子揭示了上涨/下跌的过程（是缓慢爬升还是单日暴涨）。SUMD 越高说明多头推升力量越强且越稳定。
