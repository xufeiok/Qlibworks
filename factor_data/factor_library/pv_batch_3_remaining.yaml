name: pv_batch_3_remaining
version: '2.0'
strategy_type: 价量因子batch_3剩余部分
description: batch_3 未完成 26 个因子
factors:
- name: CORR10
  category: 滚动时间窗口 (Rolling)
  expression:
    qlib: Corr($close, Log($volume+1), 10)
    duckdb: DuckDB暂未实现完整的Alpha158对应逻辑
  meaning: '【核心含义】

    量价相关性 (Correlation)：过去10天价格与成交量的相关系数。反映''量增价涨''或''量缩价跌''等量价配合关系的紧密程度。


    【运行原理】

    序列提取：在设定的N天滑动窗口内，同步截取每日的收盘价序列与成交量序列；

    相关性计算：直接对这两个原始绝对值序列计算皮尔逊相关系数(Pearson Correlation)；

    状态输出：生成-1到1之间的系数，无需去均值或对数化，用于最直观地评估当前区间内价格高低与成交量大小之间的线性同步程度。'
  usage_scenario: 量价配合度分析，验证过去10天的趋势是否得到资金支持。
  strategy_hint: 传统技术分析认为'量价齐升'是健康的，CORR为正且价格上涨通常信号更强。树模型可自动挖掘量价背离的负面信号。
- name: CNTN5
  category: 滚动时间窗口 (Rolling)
  expression:
    qlib: Mean($close<Ref($close, 1), 5)
    duckdb: DuckDB暂未实现完整的Alpha158对应逻辑
  meaning: '【核心含义】

    下跌天数占比 (Count Negative)：过去5天中收益率为负的天数占比。反映空头占据优势的交易日频率。


    【运行原理】

    跌势识别：逐日对比过去N天的收盘价与前一交易日收盘价，仅对“当日收盘价 < 前日收盘价”的交易日进行布尔标记（True为1，False为0）；

    概率统计：在滑动窗口内对布尔序列求均值，计算出该区间内阴线（下跌日）出现的相对比例；

    情绪刻画：数值越接近1，说明该区间内股票几乎每天都在下跌，反映出极强的空头压制与市场悲观情绪。'
  usage_scenario: 微观动量与买卖意愿度量（类似 RSI 的逻辑），刻画过去5天的绝对多空力量对比。
  strategy_hint: 相比于简单的区间收益率，这类因子揭示了上涨/下跌的过程（是缓慢爬升还是单日暴涨）。SUMD 越高说明多头推升力量越强且越稳定。
