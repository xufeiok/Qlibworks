- name: VSUMD5
  category: 滚动时间窗口 (Rolling)
  expression:
    qlib: (Sum(Greater($volume-Ref($volume, 1), 0), 5)-Sum(Greater(Ref($volume, 1)-$volume,
      0), 5))/(Sum(Abs($volume-Ref($volume, 1)), 5)+1e-12)
    duckdb: DuckDB暂未实现完整的Alpha158对应逻辑
  meaning: '【核心含义】

    放缩量净差占比 (Volume Sum Difference)：过去5天成交量增加与减少部分的净差占比。


    【运行原理】

    量能多空拆解：在N天窗口内，根据当日股价的涨跌，将成交量变化拆分为“伴随上涨的增量”与“伴随下跌的增量”；

    量能轧差：计算上涨增量总和与下跌增量总和的差值，得到资金追涨杀跌的“净量能”；

    总基准归一化：将净量能除以这N天内所有成交量绝对变化的整体和；

    资金净推力：正值代表放量上涨的良性推力，负值代表放量下跌的恶性砸盘，用于甄别资金的真实意图。'
  usage_scenario: 成交量异常波动与资金活跃度跟踪（过去5天）。
  strategy_hint: 量能是价格的先行指标。成交量骤增（VMA偏离）或波动率放大（VSTD）常意味着资金异动，需结合价格动量（如ROC）一起作为交叉特征输入。
