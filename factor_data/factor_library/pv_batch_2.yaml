- name: RANK5
  category: 滚动时间窗口 (Rolling)
  expression:
    qlib: Rank($close, 5)
    duckdb: DuckDB暂未实现完整的Alpha158对应逻辑
  meaning: '【核心含义】

    价格相对排位 (Rank)：当前价格在过去5天价格中的百分比排位。反映当前处于近期波动区间的什么水平。


    【运行原理】

    数据收集：在N天的滑动窗口内，收集每日的收盘价；

    截面排序：将当前的最新收盘价与窗口内历史所有收盘价进行大小比对；

    分位数换算：计算当前价格在历史序列中所处的百分比排名(Rank)；

    相对强弱定性：结果在0到1之间，1表示当前创出新高，0表示创出新低，用于判断当前价格在近期波动区间内的相对身位。'
  usage_scenario: 识别过去5天的支撑阻力位及超买超卖状态（如震荡市的区间交易）。
  strategy_hint: RSV 和 RANK 常用于构建类似于 KDJ 或 Williams %R 的技术指标，值接近极值（如超80%或低于20%）时反转概率大。
