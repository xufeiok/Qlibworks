    duckdb: DuckDB暂未实现完整的Alpha158对应逻辑
  meaning: '【核心含义】

    区间最低价相对值 (Min)：过去5天的最低价相对当前价格的比值。反映当前价格距离前期低点的距离（支撑位）。


    【运行原理】

    极值扫描：在设定的N天滑动窗口内，遍历每一天的最低价；

    谷值提取：找出这N天中的全局最低价(Min)，即近期的支撑位；

    支撑位归一化：将提取出的历史最低价除以当前的最新收盘价；

    破底距离刻画：数值反映了当前价格距离近期前低的空间。数值越接近1，说明面临破位风险；数值越小（离1越远），说明已经大幅反弹脱离底部。'
  usage_scenario: 识别过去5天的支撑阻力位及超买超卖状态（如震荡市的区间交易）。
