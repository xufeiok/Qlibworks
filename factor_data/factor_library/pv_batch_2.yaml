- name: QTLU5
  category: 滚动时间窗口 (Rolling)
  expression:
    qlib: Quantile($close, 5, 0.8)/$close
    duckdb: DuckDB暂未实现完整的Alpha158对应逻辑
  meaning: '【核心含义】

    区间上分位数 (Quantile Up)：过去5天价格的80%分位数相对当前价格的比值。类似布林带上轨概念。


    【运行原理】

    分位数排序：在设定的N天时间窗口内，将所有交易日的收盘价从小到大进行排列；

    高位分位提取：提取位于 80% 分位点(0.8)的收盘价，作为该区间的“稳健压力位”（剔除了极端的单日最高价干扰）；

    归一化处理：将该80%分位价格除以当前的最新收盘价；

    上行阻力评估：衡量当前价格距离近期筹码高位密集区的距离，评估向上突破需要克服的阻力大小。'
  usage_scenario: 识别过去5天的支撑阻力位及超买超卖状态（如震荡市的区间交易）。
  strategy_hint: RSV 和 RANK 常用于构建类似于 KDJ 或 Williams %R 的技术指标，值接近极值（如超80%或低于20%）时反转概率大。
