<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;900&display=swap');
      .bg { fill: #000000; }
      .stat { font-family: 'Noto Sans SC', sans-serif; font-weight: 900; font-size: 300px; fill: #FFD60A; }
      .desc { font-family: 'Noto Sans SC', sans-serif; font-weight: 400; font-size: 60px; fill: #FFFFFF; }
    </style>
  </defs>
  <rect width="100%" height="100%" class="bg"/>
  
  <circle cx="540" cy="500" r="300" fill="#333333"/>
  
  <text x="540" y="600" text-anchor="middle" class="stat">40%</text>
  
  <text x="540" y="1000" text-anchor="middle" class="desc">
    <tspan x="540" dy="0">Productivity Lost</tspan>
    <tspan x="540" dy="90">Due to Switching</tspan>
  </text>
</svg>