<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;900&display=swap');
      .bg { fill: #1D1D1F; }
      .title { font-family: 'Noto Sans SC', sans-serif; font-weight: 900; font-size: 120px; fill: #FFFFFF; }
      .sub { font-family: 'Noto Sans SC', sans-serif; font-weight: 400; font-size: 50px; fill: #86868B; }
      .accent { fill: #FF3B30; }
    </style>
  </defs>
  <rect width="100%" height="100%" class="bg"/>
  
  <!-- Decorative Cross -->
  <rect x="490" y="200" width="100" height="400" class="accent" rx="50"/>
  <rect x="340" y="350" width="400" height="100" class="accent" rx="50"/>
  
  <!-- Text Content -->
  <text x="100" y="800" class="title">
    <tspan x="100" dy="0">STOP</tspan>
    <tspan x="100" dy="130">MULTITASKING</tspan>
  </text>
  <text x="100" y="1100" class="sub">
    <tspan x="100" dy="0">It is killing your</tspan>
    <tspan x="100" dy="70">productivity silently.</tspan>
  </text>
</svg>