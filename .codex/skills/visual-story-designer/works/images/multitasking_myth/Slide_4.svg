  <text x="540" y="700" text-anchor="middle" class="cta">
    <tspan x="540" dy="0">FOCUS ON</tspan>
    <tspan x="540" dy="100">ONE THING.</tspan>
  </text>
  
  <text x="540" y="1100" text-anchor="middle" font-size="40" fill="#333" font-family="sans-serif">Save this for later ↓</text>
