<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;900&display=swap');
      .bg { fill: #FFFFFF; }
      .cta { font-family: 'Noto Sans SC', sans-serif; font-weight: 900; font-size: 80px; fill: #007AFF; }
    </style>
  </defs>
  <rect width="100%" height="100%" class="bg"/>
