<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;900&display=swap');
      .bg { fill: #F5F5F7; }
      .head { font-family: 'Noto Sans SC', sans-serif; font-weight: 900; font-size: 80px; fill: #1D1D1F; }
      .body { font-family: 'Noto Sans SC', sans-serif; font-weight: 400; font-size: 50px; fill: #333333; }
      .num { font-family: 'Noto Sans SC', sans-serif; font-weight: 900; font-size: 400px; fill: #E5E5E5; }
    </style>
  </defs>
  <rect width="100%" height="100%" class="bg"/>
  
  <!-- Big Number Background -->
  <text x="900" y="400" text-anchor="end" class="num">01</text>
  
  <text x="100" y="500" class="head">
    <tspan x="100" dy="0">YOUR BRAIN</tspan>
    <tspan x="100" dy="100">IS SERIAL</tspan>
  </text>
  
  <text x="100" y="800" class="body">
    <tspan x="100" dy="0">You cannot focus on</tspan>
    <tspan x="100" dy="70">two things at once.</tspan>
    <tspan x="100" dy="120">You are just</tspan>
    <tspan x="100" dy="70">switching context</tspan>
    <tspan x="100" dy="70">rapidly.</tspan>
  </text>
</svg>