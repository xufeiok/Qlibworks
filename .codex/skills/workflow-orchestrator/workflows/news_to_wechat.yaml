name: "Auto News to WeChat & Visual Story"
description: "Scans trending news, generates a personal growth topic, writes an article, creates visual storyboards, and publishes to WeChat."
schedule: "09:30"

steps:
  # Step 1: Scan for Hot News
  - id: scan
    skill: trending-news-scanner
    command: python scripts/scan.py --output news.json

  # Step 2: Generate Topic from News
  - id: topic
    skill: news-topic-generator
    # Uses the output from Step 1
    command: python scripts/generate.py --input "{scan.output}" --output topic.json

  # Step 3: Write Article based on Topic
  - id: write
    skill: copywriting
    # Uses the output from Step 2
    command: python scripts/write.py --input "{topic.output}" --output article.md

  # Step 4: Generate Visual Storyboard (SVG)
  - id: visual_design
    skill: visual-story-designer
    # Uses the output from Step 3
    command: python scripts/generate_storyboard.py "{write.output}"

  # Step 5: Render SVGs to PNGs
  - id: visual_render
    skill: visual-story-designer
    # Uses the output from Step 4 (Storyboard Markdown)
    command: python scripts/svg_gen.py "{visual_design.output}"

  # Step 6: Publish to WeChat
  - id: publish
    skill: publish-to-wechat
    # Uses the output from Step 3 (Article Markdown)
    command: python main.py "{write.output}"
