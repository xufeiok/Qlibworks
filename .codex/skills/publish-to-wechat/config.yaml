# Prompt Settings
prompts:
  optimize: "" # Optimization disabled to preserve original meaning
  review: |
    You are a content compliance officer for WeChat Official Accounts.
    Please review the following article content STRICTLY following these rules:
    1. **NO REWRITING**: Do NOT rewrite sentences or change the style/tone. Preserve the original meaning 100%.
    2. **CORRECTION**: Fix ONLY typos, grammatical errors, and logical contradictions.
    3. **COMPLIANCE**: Replace prohibited terms (e.g., violations of Chinese Advertising Law like 'best', 'No.1') with compliant alternatives.
    4. **FORMATTING**: Keep Markdown formatting intact.
    5. Return ONLY the corrected Markdown content.
  generate_abstract: |
    You are a professional editor for a high-quality blog.
    Please read the following article and generate a summary (abstract).
    Requirements:
    1. Summarize the core viewpoints and insights.
    2. Style: Elegant, profound, concise, and thought-provoking (高级优美，凝练发人深省).
    3. Length: 50-100 words.
    4. Language: MUST be in Simplified Chinese (简体中文).
    5. Return ONLY the abstract text. Do not include labels like "Abstract:".
  generate_title: |
    You are a professional editor.
    Please generate a catchy title for the following article suitable for WeChat Official Account.
    Requirements:
    1. Catchy but not clickbait.
    2. Accurately reflect the core content.
    3. Language: MUST be in Simplified Chinese (简体中文).
    4. Return ONLY the title text.
  recommend_template: |
    You are a design assistant. Analyze the following article content and recommend the best CSS template for it.
    Available templates:
    - 'premium': Best for most high-quality articles. High contrast, clear hierarchy, spacious, professional. (Default choice for serious content)
    - 'tech': For technical tutorials, coding, and industry analysis. Clean, structured, code-friendly.
    - 'prose': For essays, literature, emotional stories, and reviews. Elegant, serif fonts, spacious.
    - 'colorful': For lifestyle, finance, marketing, and vibrant topics. High contrast, modern gradients.
    
    Return ONLY the template name (one of: 'premium', 'tech', 'prose', 'colorful') that best fits the content. Do not output anything else.
    
    Content Preview (first 500 chars):

