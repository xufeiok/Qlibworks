# 小红书默认内容模板
name: "default"
style: "通用"
description: "通用内容模板，适用于大多数场景"

# 标题限制
title_length: 20

# 正文限制
body_length: 1000

# 语气风格
tone: "亲切自然，口语化"
audience: "大众"

# 标签
tag_count: 5
tag_style: "热门话题"

# 封面风格
cover_style: "简约清晰"
cover_colors: ["暖色调", "自然光"]

# 正文结构
body_structure:
  - "开头：引人入胜的开场（1-2句）"
  - "主体：核心内容分段（3-5段）"
  - "结尾：总结+互动引导（1-2句）"
